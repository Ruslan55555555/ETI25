<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>Реєстрація</h1>
        <nav>
            <a class="nav-btn" href="index.html">На головну</a>
        </nav>
    </header>
    <main>
        <section class="form-section">
            <h2>Зареєструйтеся</h2>
            <form action="#" method="post" class="register-form">
                <label for="fullname">Повне ім'я</label>
                <input type="text" id="fullname" name="fullname" placeholder="Ваше ім'я" required>

                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>

                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Пароль" required>

                <label for="password-confirm">Підтвердіть пароль</label>
                <input type="password" id="password-confirm" name="password_confirm" placeholder="Повторіть пароль" required>

                <button type="submit" class="btn">Зареєструватися</button>
            </form>
        </section>
    </main>
</body>
</html>
